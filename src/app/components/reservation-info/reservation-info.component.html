<div class="stats-grid">
  <div class="stat-card stat-card--warning">
    <span class="stat-value">{{ pendentes }}</span>
    <span class="stat-label">Pendentes</span>
  </div>
  <div class="stat-card stat-card--info">
    <span class="stat-value">{{ checkinRealizados }}</span>
    <span class="stat-label">Em Estacionamento</span>
  </div>
  <div class="stat-card stat-card--success">
    <span class="stat-value">{{ checkoutRealizados }}</span>
    <span class="stat-label">Finalizados</span>
  </div>
  <div class="stat-card stat-card--danger">
    <span class="stat-value">{{ canceladas }}</span>
    <span class="stat-label">Canceladas</span>
  </div>
</div>
