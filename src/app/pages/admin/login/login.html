<header class="dark-header">
  <span class="dark-header-title">Admin</span>
  <a routerLink="/" class="dark-header-link">Voltar</a>
</header>

<div class="login-page">
  <div class="login-content">
    <h1 class="login-main-title">Area Administrativa</h1>
    <p class="login-main-subtitle">Acesso restrito ao dono</p>

    <div class="login-card">
      <h2 class="login-section-title">Login</h2>

      <form (ngSubmit)="entrar()">
        <div class="form-group">
          <label class="form-label form-label-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#64748b"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Usuario
          </label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="usuario"
            name="usuario"
            placeholder="Digite seu usuario"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label class="form-label form-label-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#64748b"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            Senha
          </label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="senha"
            name="senha"
            placeholder="Digite sua senha"
            autocomplete="current-password"
          />
        </div>

        @if (erro()) {
          <div class="alert alert-danger">{{ erro() }}</div>
        }

        <button type="submit" class="btn btn-dark btn-block btn-lg" [disabled]="loading()">
          @if (loading()) {
            Carregando...
          } @else {
            Entrar
          }
        </button>
      </form>

      <p class="login-hint">Demo: use adminDev/adminDev123</p>
    </div>
  </div>
</div>
