<div class="landing-page">
  <div class="landing-content">
    <img class="landing-logo" src="assets/logo-dfpark.svg" alt="DF Park Estacionamento" />
    <p class="landing-subtitle">Sistema de Gestão</p>

    <div class="landing-buttons">
      <app-landing-button label="Área do Cliente" [fullWidth]="true" (clicked)="goToClient()">
        <img icon src="assets/icons/person-white.icon.svg" alt="person icon" />
      </app-landing-button>

      <app-landing-button
        label="Área Administrativa"
        variant="outline"
        [fullWidth]="true"
        (clicked)="goToAdmin()"
      >
        <img icon src="assets/icons/gear.icon.svg" alt="gear icon" />
      </app-landing-button>
    </div>
  </div>
</div>
