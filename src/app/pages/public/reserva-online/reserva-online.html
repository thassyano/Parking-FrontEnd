<div class="page-header">
  <h1>Reservar Vaga Online</h1>
</div>

<div class="card">
  <form (ngSubmit)="submeter()">
    <div class="form-group">
      <label class="form-label" for="nomeCliente">Nome Completo</label>
      <input id="nomeCliente" type="text" class="form-control" [(ngModel)]="nomeCliente" name="nomeCliente" placeholder="Seu nome completo" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="telefoneCliente">Telefone</label>
      <input id="telefoneCliente" type="tel" class="form-control" [(ngModel)]="telefoneCliente" name="telefoneCliente" placeholder="61999999999" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="cpfCliente">CPF</label>
      <input id="cpfCliente" type="text" class="form-control" [(ngModel)]="cpfCliente" name="cpfCliente" placeholder="CPF (opcional)" />
    </div>
    <div class="form-group">
      <label class="form-label" for="tipoVaga">Tipo de Vaga</label>
      <select id="tipoVaga" class="form-select" [(ngModel)]="tipoVaga" name="tipoVaga">
        <option value="Coberta">Coberta</option>
        <option value="Descoberta">Descoberta</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="dataEntrada">Data de Entrada</label>
      <input id="dataEntrada" type="date" class="form-control" [(ngModel)]="dataEntrada" name="dataEntrada" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="qtdDias">Quantidade de Dias</label>
      <input id="qtdDias" type="number" class="form-control" [(ngModel)]="qtdDias" name="qtdDias" min="1" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="observacoes">Observacoes</label>
      <textarea id="observacoes" class="form-control" [(ngModel)]="observacoes" name="observacoes" placeholder="Observacoes (opcional)" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading()">
      {{ loading() ? 'Processando...' : 'Reservar' }}
    </button>
  </form>
</div>

@if (erro()) {
  <div class="alert alert-danger">{{ erro() }}</div>
}
