<app-header [headerName]="'Admin'"></app-header>

<div class="login_page">
  <div class="login_content">
    <h1 class="login_main_title">Área Administrativa</h1>
    <p class="login_main_subtitle">Acesso restrito ao dono</p>

    <div class="login_card">
      <h2 class="login_section_title">Login</h2>

      <form [formGroup]="loginForm" (onSubmit)="onLogin()">
        <div class="form_group">
          <label class="form_label form_label_icon">
            <img class="label_img" src="assets/icons/person-dark.icon.svg" alt="" />
            Usuário
          </label>

          <input
            type="text"
            class="form_control"
            formControlName="usuario"
            placeholder="Digite seu usuário"
          />
        </div>

        <div class="form_group">
          <label class="form_label form_label_icon">
            <img class="label_img" src="assets/icons/lock.icon.svg" alt="" />
            Senha
          </label>

          <input
            type="password"
            class="form_control"
            formControlName="senha"
            placeholder="Digite sua senha"
          />
        </div>

        <app-landing-button
          [type]="'submit'"
          [label]="isLoading() ? 'Carregando...' : 'Entrar'"
          [variant]="'primary'"
          [fullWidth]="true"
          [disabled]="isLoading()"
          (clicked)="onLogin()"
        ></app-landing-button>
      </form>

      <p class="login_hint">Demo: adminDev/adminDev123</p>
    </div>
  </div>
</div>
