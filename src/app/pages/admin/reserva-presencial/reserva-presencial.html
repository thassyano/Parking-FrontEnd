<div class="page-header">
  <h1 class="page-title">Nova Reserva Presencial</h1>
</div>

@if (erro()) {
  <div class="alert alert-danger">{{ erro() }}</div>
}

<!-- Dados do cliente (compartilhados) -->
<div class="card reserva-form-card">
  <div class="card-header reserva-form-card-header">
    <h2 class="card-title reserva-form-card-title">Dados do Cliente</h2>
  </div>
  <div class="cliente-form-body">
    <div class="cliente-form-grid">
      <div class="form-group cliente-form-group cliente-form-group--nome">
        <label class="form-label" for="nomeCliente">Nome do Cliente *</label>
        <input
          id="nomeCliente"
          type="text"
          class="form-control"
          [(ngModel)]="nomeCliente"
          name="nomeCliente"
          required
        />
      </div>
      <div class="form-group cliente-form-group cliente-form-group--telefone">
        <label class="form-label" for="telefoneCliente">Telefone *</label>
        <input
          id="telefoneCliente"
          type="tel"
          class="form-control"
          [(ngModel)]="telefoneCliente"
          name="telefoneCliente"
          required
        />
      </div>
      <div class="form-group cliente-form-group cliente-form-group--cpf">
        <label class="form-label" for="cpfCliente">CPF</label>
        <input
          id="cpfCliente"
          type="text"
          class="form-control"
          [(ngModel)]="cpfCliente"
          name="cpfCliente"
        />
      </div>
    </div>
  </div>
</div>

<!-- Card por veículo -->
@for (veiculo of veiculos; track $index) {
  <div class="card reserva-form-card">
    <div class="card-header reserva-form-card-header">
      <h2 class="card-title reserva-form-card-title reserva-form-card-title--with-icon">
        <span class="reserva-form-card-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
        </span>
        Veículo {{ $index + 1 }}
      </h2>
      @if (veiculos.length > 1) {
        <button type="button" class="btn btn-outline btn-sm btn-danger-outline" (click)="removerVeiculo($index)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM7 9h2v8H7V9zm-1 12a2 2 0 0 1-2-2V7h16v12a2 2 0 0 1-2 2H6z"/>
          </svg>
          Remover
        </button>
      }
    </div>

    <div class="veiculo-form-body">
    <div class="form-row veiculo-form-row">
      <div class="form-group">
        <label class="form-label">Placa do Veículo *</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="veiculo.placaVeiculo"
          [name]="'placa_' + $index"
          placeholder="ABC1D23"
          style="text-transform: uppercase;"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de Vaga</label>
        <select
          class="form-control form-select"
          [(ngModel)]="veiculo.tipoVaga"
          [name]="'tipoVaga_' + $index"
        >
          <option value="Coberta">Coberta</option>
          <option value="Descoberta">Descoberta</option>
        </select>
      </div>
    </div>

    <div class="form-row veiculo-form-row">
      <div class="form-group">
        <label class="form-label">Data de Entrada *</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="veiculo.dataEntrada"
          [name]="'dataEntrada_' + $index"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label">Hora de Entrada</label>
        <input
          type="time"
          class="form-control"
          [(ngModel)]="veiculo.horaEntrada"
          [name]="'horaEntrada_' + $index"
        />
      </div>
    </div>

    <div class="form-row veiculo-form-row">
      <div class="form-group">
        <label class="form-label">Data de Saída Prevista</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="veiculo.dataSaida"
          [name]="'dataSaida_' + $index"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Hora de Saída Prevista</label>
        <input
          type="time"
          class="form-control"
          [(ngModel)]="veiculo.horaSaida"
          [name]="'horaSaida_' + $index"
        />
      </div>
    </div>

    <div class="form-row veiculo-form-row veiculo-form-row--last">
      <div class="form-group">
        <label class="form-label">Quantidade de Dias</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="veiculo.qtdDias"
          [name]="'qtdDias_' + $index"
          min="1"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="veiculo.observacoes"
          [name]="'obs_' + $index"
          placeholder="Opcional"
        />
      </div>
    </div>
    </div>
  </div>
}

<!-- Botão adicionar veículo -->
<div class="card" style="padding: 1rem;">
  <button type="button" class="btn btn-outline btn-block btn-adicionar-carro" (click)="adicionarVeiculo()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Adicionar outro veículo
  </button>
</div>

<!-- Registrar -->
<div class="card" style="padding: 1rem;">
  <button
    type="button"
    class="btn btn-primary btn-lg btn-block"
    (click)="submeter()"
    [disabled]="loading()"
  >
    @if (loading()) {
      Registrando...
    } @else if (veiculos.length > 1) {
      Registrar {{ veiculos.length }} Entradas
    } @else {
      Registrar Entrada
    }
  </button>
</div>
